version: '3.8'

services:
  ros2_end_of_arm:
    image: flynnbm/ros2-end-of-arm:latest
    container_name: ros2_end_of_arm_dev
    # Do NOT use this if default Docker networking already exposes ROS 2 topics correctly
    # network_mode: host
    privileged: true
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    stdin_open: true
    tty: true
    command: tail -f /dev/null